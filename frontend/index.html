<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AI Analysis Suite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 YouTube AI Analysis Suite</h1>
            <p>Automatische Video-Analyse mit KI</p>
            <div class="status-badge" id="api-status">API Status: Prüfe...</div>
        </header>
        
        <div id="error-message" class="message error-message"></div>
        <div id="success-message" class="message success-message"></div>
        
        <main>
            <div class="card">
                <h2>Neuen Job erstellen</h2>
                <form id="job-form">
                    <div class="form-group">
                        <label for="video-url">YouTube URL:</label>
                        <input type="text" id="video-url" placeholder="https://www.youtube.com/watch?v=..." required>
                    </div>
                    
                    <div class="form-group">
                        <label for="whisper-model">Whisper Modell:</label>
                        <select id="whisper-model">
                            <option value="tiny" selected>tiny (schnell)</option>
                            <option value="base">base (ausgewogen)</option>
                        </select>
                    </div>
                    
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" id="summary-check" checked> Zusammenfassung
                        </label>
                        <label>
                            <input type="checkbox" id="chapters-check" checked> Kapitel
                        </label>
                        <label>
                            <input type="checkbox" id="podcast-check"> Podcast
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label for="summary-style">Zusammenfassungs-Stil:</label>
                        <select id="summary-style">
                            <option value="stichpunkte">Stichpunkte</option>
                            <option value="ausführlich">Ausführlich</option>
                            <option value="kernaussagen">Kernaussagen</option>
                            <option value="podcast">Podcast-Skript</option>
                        </select>
                    </div>
                    
                    <button type="submit">Job erstellen</button>
                </form>
            </div>
            
            <div class="card">
                <h2>Statistiken</h2>
                <div id="stats-container"></div>
            </div>
            
            <div class="card">
                <h2>Jobs Übersicht</h2>
                <div id="jobs-container">Lade Jobs...</div>
            </div>
        </main>
    </div>
    
    <!-- Chat Modal -->
    <div id="chat-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>💬 KI-Chat <span id="chat-job-id"></span></h3>
                <div>
                    <button class="modal-btn" onclick="clearChatHistory()">🗑️ Verlauf löschen</button>
                    <button class="modal-btn close" onclick="closeChat()">✖️ Schließen</button>
                </div>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Frage zum Video stellen...">
                <button onclick="sendChatMessage()">📤 Senden</button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
