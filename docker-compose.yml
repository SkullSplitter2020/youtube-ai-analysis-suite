services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yt_geheim}
      POSTGRES_DB: ${POSTGRES_DB:-yt_ai_suite}
    volumes:
      - postgres_daten:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yt_user} -d ${POSTGRES_DB:-yt_ai_suite}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_daten:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-yt_user}:${POSTGRES_PASSWORD:-yt_geheim}@postgres:5432/${POSTGRES_DB:-yt_ai_suite}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-sichererschluessel}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-yt_user}:${POSTGRES_PASSWORD:-yt_geheim}@postgres:5432/${POSTGRES_DB:-yt_ai_suite}
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WHISPER_MODELL=${WHISPER_MODELL:-base}
      - WHISPER_GERAET=${WHISPER_GERAET:-cpu}
      - WHISPER_BERECHNUNG=${WHISPER_BERECHNUNG:-int8}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - API_URL=http://192.168.178.40:8000
    depends_on:
      - api
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_daten:/root/.ollama
    restart: unless-stopped
    # GPU (optional, falls verfügbar):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  postgres_daten:
  redis_daten:
  ollama_daten:    # ← NEU